<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Lighter Project</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center; 
            background-color: #f4f4f4; 
            padding: 40px 20px;
            font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #333;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 50px;
            padding-bottom: 10px;
        }

        h3 {
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 20px;
            color: #555;
            width: 100%;
            max-width: 800px;
            text-align: left;
        }

        img {
            max-width: 800px;
            width: 100%;   
            height: auto;    
            margin-bottom: 40px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); 
            border-radius: 4px; 
            background-color: #fff;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; letter-spacing: 2px; }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
